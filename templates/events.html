<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Explore Events | Virinchi 2K26</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .bg-purple { background-color: #4a148c !important; }
        .text-purple { color: #4a148c !important; }

        .btn-purple {
            background-color: #4a148c !important;
            color: white !important;
        }

        .btn-outline-purple {
            border-color: #4a148c;
            color: #4a148c;
        }

        .card-custom {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            transition: transform 0.2s;
        }

        .card-custom:hover {
            transform: translateY(-4px);
        }

        .tag-custom {
            background-color: #f3e5f5;
            color: #4a148c;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            display: inline-block;
            margin-right: 0.35rem;
            margin-bottom: 0.35rem;
        }

        .event-image {
            height: 180px;
            width: 100%;
            object-fit: cover;
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-purple shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            ✨ Virinchi 2K26
        </a>

        <div>
            <a class="nav-link d-inline text-white mx-2" href="/">Home</a>

            <a class="nav-link d-inline text-warning fw-bold mx-2" href="/events">
                Events
            </a>

            <a class="nav-link d-inline text-white mx-2" href="/my-events">
                📅 My Schedule
            </a>

            <a class="nav-link d-inline text-white mx-2" href="/recommendations">
                🧠 Recommendations
            </a>
        </div>

    </div>
</nav>

<div class="container my-5">

    <div class="row mb-4 align-items-center">

        <div class="col-md-6">
            <h1 class="text-purple fw-bold mb-1">
                Festival Event Catalogue
            </h1>

            <p class="text-muted">
                Browse through technical tracks and cultural competitions.
            </p>
        </div>

        <div class="col-md-3">
            <input type="text"
                   id="searchInput"
                   class="form-control"
                   placeholder="Search events..."
                   onkeyup="searchEvents()">
        </div>

        <div class="col-md-3">
            <div class="input-group">

                <label class="input-group-text bg-purple text-white border-0">
                    Filter
                </label>

                <select class="form-select"
                        id="categoryFilter"
                        onchange="filterEvents()">

                    <option value="all">All Categories</option>
                    <option value="Technical">Technical Events</option>
                    <option value="Cultural">Cultural Events</option>

                </select>

            </div>
        </div>

    </div>

    <div id="eventsGrid" class="row g-4">

        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary"></div>

            <p class="text-muted mt-2">
                Loading events...
            </p>
        </div>

    </div>

</div>


<div class="modal fade" id="editEventModal" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content border-0 shadow-lg">

            <div class="modal-header bg-purple text-white">

                <h5 class="modal-title">
                    Edit Event
                </h5>

                <button type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <input type="hidden" id="editEventId">

                <label class="form-label">Title</label>
                <input type="text" id="editTitle" class="form-control mb-3">

                <label class="form-label">Category</label>
                <select id="editCategory" class="form-select mb-3">
                    <option value="Technical">Technical</option>
                    <option value="Cultural">Cultural</option>
                </select>

                <label class="form-label">Sub Category</label>
                <input type="text" id="editSubCategory" class="form-control mb-3">

                <label class="form-label">Date</label>
                <input type="text" id="editDate" class="form-control mb-3">

                <label class="form-label">Venue</label>
                <input type="text" id="editVenue" class="form-control mb-3">

                <label class="form-label">Tags</label>
                <input type="text" id="editTags" class="form-control mb-3">

                <label class="form-label">Update Poster</label>
                <input type="file"
                       id="editImage"
                       class="form-control mb-3"
                       accept="image/*">

                <label class="form-label">Description</label>
                <textarea id="editDescription"
                          class="form-control"
                          rows="3"></textarea>

            </div>

            <div class="modal-footer">

                <button class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    Cancel
                </button>

                <button class="btn btn-warning fw-bold"
                        onclick="submitEditEvent()">
                    Save Changes
                </button>

            </div>

        </div>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const sessionUser = "{{ session.get('username', '') }}";
const sessionRole = "{{ session.get('role', '') }}";

let allEvents = [];

async function loadEvents() {

    try {

        const response = await fetch('/api/events-data');

        if (!response.ok) {
            throw new Error("Failed to load events");
        }

        allEvents = await response.json();

        renderEvents(allEvents);

    } catch (error) {

        document.getElementById('eventsGrid').innerHTML = `
            <div class="col-12 text-center py-4 text-danger fw-bold">
                ⚠️ Error loading events.
            </div>
        `;
    }
}


function renderEvents(eventsList) {

    const grid = document.getElementById('eventsGrid');

    if (eventsList.length === 0) {

        grid.innerHTML = `
            <div class="col-12 text-center text-muted">
                No matching events found.
            </div>
        `;

        return;
    }

    grid.innerHTML = eventsList.map(event => {

        let dynamicActionHtml = '';

        if (sessionRole === 'admin' || sessionRole === 'organizer') {

            dynamicActionHtml = `
                <div class="d-flex gap-2 w-100 mt-3">

                    <button class="btn btn-outline-secondary btn-sm w-50"
                            onclick="editEvent(${event.event_id})">
                        ✏️ Edit
                    </button>

                    <button class="btn btn-outline-danger btn-sm w-50"
                            onclick="deleteEvent(${event.event_id})">
                        🗑️ Delete
                    </button>

                </div>
            `;

        } else if (sessionUser !== '') {

            dynamicActionHtml = `
                <button class="btn btn-purple btn-sm w-100 mt-3 fw-bold"
                        onclick="registerForEvent(${event.event_id})">
                    📝 Register for Event
                </button>
            `;

        } else {

            dynamicActionHtml = `
                <a href="/login"
                   class="btn btn-outline-purple btn-sm w-100 mt-3">
                    🔑 Sign In to Register
                </a>
            `;
        }

        return `
            <div class="col-md-4">

                <div class="card h-100 card-custom bg-white p-4 shadow-sm">

                    <div class="d-flex justify-content-between mb-2">

                        <span class="badge ${
                            event.category === 'Technical'
                            ? 'bg-warning text-dark'
                            : 'bg-info text-white'
                        }">
                            ${event.category}
                        </span>

                        <small class="text-muted">
                            ${event.sub_category}
                        </small>

                    </div>

                    ${event.image_url ? `
                        <img src="${event.image_url}"
                             class="event-image mb-3">
                    ` : ''}

                    <h4 class="fw-bold text-dark mb-2">
                        ${event.title}
                    </h4>

                    <p class="text-muted small">
                        ${event.description}
                    </p>

                    <div class="mb-3">

                        ${(event.tags || '').split(',').map(tag => `
                            <span class="tag-custom">
                                ${tag.trim()}
                            </span>
                        `).join('')}

                    </div>

                    <div class="pt-3 border-top mt-auto text-muted small">

                        📍 <strong>Venue:</strong> ${event.venue}<br>

                        📅 <strong>Date:</strong> ${event.date}

                    </div>

                    <a href="/event/${event.event_id}"
                       class="btn btn-outline-primary btn-sm mt-3">
                        👁️ View Details
                    </a>

                    ${dynamicActionHtml}

                </div>

            </div>
        `;

    }).join('');
}


async function registerForEvent(eventId) {

    const formData = new FormData();

    formData.append('event_id', eventId);

    const response = await fetch('/api/student/register-event', {
        method: 'POST',
        body: formData
    });

    if (response.ok) {

        alert("Registration successful!");

    } else {

        const error = await response.text();

        alert("Registration failed: " + error);
    }
}


async function deleteEvent(eventId) {

    if (!confirm("Are you sure you want to delete this event?")) {
        return;
    }

    const response = await fetch(`/api/admin/delete-event/${eventId}`, {
        method: 'POST'
    });

    if (response.ok) {

        alert("Event deleted successfully.");

        loadEvents();

    } else {

        const error = await response.text();

        alert("Delete failed: " + error);
    }
}


function editEvent(eventId) {

    const event = allEvents.find(e => e.event_id === eventId);

    if (!event) {

        alert("Event not found.");

        return;
    }

    document.getElementById('editEventId').value = event.event_id;
    document.getElementById('editTitle').value = event.title;
    document.getElementById('editCategory').value = event.category;
    document.getElementById('editSubCategory').value = event.sub_category;
    document.getElementById('editDate').value = event.date;
    document.getElementById('editVenue').value = event.venue;
    document.getElementById('editTags').value = event.tags;
    document.getElementById('editDescription').value = event.description;

    const modal = new bootstrap.Modal(
        document.getElementById('editEventModal')
    );

    modal.show();
}


async function submitEditEvent() {

    const eventId = document.getElementById('editEventId').value;

    const formData = new FormData();

    formData.append('title', document.getElementById('editTitle').value);
    formData.append('category', document.getElementById('editCategory').value);
    formData.append('sub_category', document.getElementById('editSubCategory').value);
    formData.append('date', document.getElementById('editDate').value);
    formData.append('venue', document.getElementById('editVenue').value);
    formData.append('tags', document.getElementById('editTags').value);
    formData.append('description', document.getElementById('editDescription').value);

    const imageFile = document.getElementById('editImage').files[0];

    if (imageFile) {
        formData.append('image', imageFile);
    }

    const response = await fetch(`/api/admin/edit-event/${eventId}`, {
        method: 'POST',
        body: formData
    });

    if (response.ok) {

        alert("Event updated successfully.");

        location.reload();

    } else {

        const error = await response.text();

        alert("Edit failed: " + error);
    }
}


function filterEvents() {

    const selected = document.getElementById('categoryFilter').value;

    if (selected === 'all') {

        renderEvents(allEvents);

    } else {

        renderEvents(
            allEvents.filter(event => event.category === selected)
        );
    }
}


function searchEvents() {

    const query = document.getElementById('searchInput').value.toLowerCase();

    const filtered = allEvents.filter(event =>

        event.title.toLowerCase().includes(query) ||

        event.description.toLowerCase().includes(query) ||

        (event.tags || '').toLowerCase().includes(query)
    );

    renderEvents(filtered);
}

window.onload = loadEvents;

</script>

</body>
</html>
