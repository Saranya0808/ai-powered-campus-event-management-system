<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Schedule | Virinchi 2K26</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-purple { background-color: #4a148c !important; }
        .text-purple { color: #4a148c !important; }
        .card-custom { border: 1px solid #e2e8f0; border-radius: 12px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-purple shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">✨ Virinchi 2K26</a>
        <div>
            <a class="nav-link d-inline text-white mx-2" href="/">Home</a>
            <a class="nav-link d-inline text-white mx-2" href="/events">Events</a>
            <a class="nav-link d-inline text-warning fw-bold mx-2" href="/my-events">📅 My Schedule</a>
            <a class="nav-link d-inline text-white mx-2" href="/api/auth/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container my-5">
    <h1 class="text-purple fw-bold mb-4">My Registered Events</h1>

    <div id="myEventsGrid" class="row g-4">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary"></div>
            <p class="text-muted mt-2">Loading your schedule...</p>
        </div>
    </div>
</div>

<script>
async function loadMyEvents() {
    const grid = document.getElementById('myEventsGrid');

    try {
        const response = await fetch('/api/student/my-events');

        if (response.status === 401) {
            grid.innerHTML = `
                <div class="col-12 text-center py-5">
                    <p class="text-danger fw-bold">Please login first.</p>
                    <a href="/login" class="btn btn-warning fw-bold">Login</a>
                </div>
            `;
            return;
        }

        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(errorText);
        }

        const events = await response.json();

        if (events.length === 0) {
            grid.innerHTML = `
                <div class="col-12 text-center py-5">
                    <p class="text-muted">You haven't registered for any events yet.</p>
                    <a href="/events" class="btn btn-warning fw-bold">Browse Events</a>
                </div>
            `;
            return;
        }

        grid.innerHTML = events.map(event => `
            <div class="col-md-4">
                <div class="card h-100 card-custom bg-white p-4 shadow-sm">
                    <span class="badge bg-success mb-2" style="width: fit-content;">Confirmed</span>
                    <h4 class="fw-bold text-dark">${event.title}</h4>
                    <p class="text-muted small">${event.description}</p>

                    <p class="small mb-1">
                        <strong>Category:</strong> ${event.category} / ${event.sub_category}
                    </p>

                    <div class="mt-auto pt-3 border-top text-muted small">
                        📍 <strong>Venue:</strong> ${event.venue}<br>
                        📅 <strong>Date:</strong> ${event.date}
                    </div>

                    <button class="btn btn-outline-danger btn-sm mt-3"
                            onclick="cancelRegistration(${event.event_id})">
                        Cancel Registration
                    </button>
                </div>
            </div>
        `).join('');

    } catch (error) {
        grid.innerHTML = `
            <div class="col-12 text-center py-4 text-danger">
                ⚠️ Error loading your schedule.<br>
                <small>${error.message}</small>
            </div>
        `;
    }
}

async function cancelRegistration(eventId) {
    if (!confirm("Cancel this registration?")) return;

    const response = await fetch(`/api/student/cancel-registration/${eventId}`, {
        method: 'POST'
    });

    if (response.ok) {
        alert("Registration cancelled.");
        loadMyEvents();
    } else {
        const msg = await response.text();
        alert("Cancel failed: " + msg);
    }
}

window.onload = loadMyEvents;
</script>

</body>
</html>
