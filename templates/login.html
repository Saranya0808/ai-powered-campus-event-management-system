<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Virinchi 2K26</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-purple { background-color: #4a148c !important; }
        .text-purple { color: #4a148c !important; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-purple shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">✨ Virinchi 2K26</a>
        <div>
            <a class="nav-link d-inline text-white mx-2" href="/">Home</a>
            <a class="nav-link d-inline text-white mx-2" href="/register">Register</a>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 rounded-3 p-4 bg-white">
                <h2 class="fw-bold text-purple text-center mb-1">Student Portal Access</h2>
                <p class="text-muted text-center small mb-4">Log in to view personalized skill metrics and matching events.</p>
                
                <form action="/api/auth/login" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-bold btn-lg">Authorize Access</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
